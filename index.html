<!DOCTYPE html>
<html lang="ru" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Сайт-визитки — репозиторий</title>
    <script>
      (function () {
        try {
          var k = "theme";
          var t = localStorage.getItem(k);
          if (t !== "light" && t !== "dark") {
            t = window.matchMedia("(prefers-color-scheme: dark)").matches
              ? "dark"
              : "light";
          }
          document.documentElement.setAttribute("data-theme", t);
        } catch (e) {}
      })();
    </script>
    <style>
      :root {
        --bg: #f4f9ff;
        --body-gradient: linear-gradient(
          180deg,
          #f8fbff 0%,
          #f2f8ff 50%,
          #eef5ff 100%
        );
        --card: rgba(255, 255, 255, 0.7);
        --text: #16263f;
        --muted: #6e85a3;
        --accent: #5f8fcf;
        --accent2: #7aa9df;
        --line: rgba(181, 210, 240, 0.65);
        --shadow-card: rgba(102, 145, 197, 0.08);
        --btn-focus: rgba(95, 143, 207, 0.35);
        --toggle-track: rgba(181, 210, 240, 0.55);
        --toggle-thumb: #ffffff;
      }

      [data-theme="dark"] {
        --bg: #0d1218;
        --body-gradient: linear-gradient(
          180deg,
          #0f1620 0%,
          #0d1218 45%,
          #0a1016 100%
        );
        --card: rgba(255, 255, 255, 0.06);
        --text: #e8eef5;
        --muted: #8a9bb3;
        --accent: #6b9dd8;
        --accent2: #8ab4e8;
        --line: rgba(122, 169, 223, 0.22);
        --shadow-card: rgba(0, 0, 0, 0.35);
        --btn-focus: rgba(139, 180, 232, 0.45);
        --toggle-track: rgba(122, 169, 223, 0.28);
        --toggle-thumb: #e8eef5;
      }

      body {
        margin: 0;
        font-family: "Segoe UI", Arial, sans-serif;
        color: var(--text);
        background: var(--body-gradient);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: color 0.22s ease, background 0.22s ease;
      }
      .wrap {
        width: min(920px, calc(100% - 32px));
        padding: 24px 0;
      }
      .page-head {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 20px;
        margin-bottom: 4px;
      }
      .head-text {
        min-width: 0;
      }
      h1 {
        margin: 0 0 12px;
        font-size: clamp(24px, 3.5vw, 40px);
        letter-spacing: -0.02em;
      }
      p {
        margin: 0 0 22px;
        color: var(--muted);
        line-height: 1.6;
      }
      .theme-toggle {
        flex-shrink: 0;
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 8px 14px;
        border-radius: 999px;
        border: 1px solid var(--line);
        background: var(--card);
        color: var(--text);
        font: inherit;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        backdrop-filter: blur(10px);
        box-shadow: 0 8px 24px var(--shadow-card);
        transition: border-color 0.2s ease, background 0.2s ease;
      }
      .theme-toggle:hover {
        border-color: var(--accent2);
      }
      .theme-toggle:focus-visible {
        outline: 3px solid var(--btn-focus);
        outline-offset: 3px;
      }
      .theme-toggle__track {
        position: relative;
        width: 44px;
        height: 24px;
        border-radius: 999px;
        background: var(--toggle-track);
        transition: background 0.22s ease;
      }
      .theme-toggle__thumb {
        position: absolute;
        top: 3px;
        left: 3px;
        width: 18px;
        height: 18px;
        border-radius: 50%;
        background: var(--toggle-thumb);
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
        transition: transform 0.22s ease, background 0.22s ease;
      }
      [data-theme="dark"] .theme-toggle__thumb {
        transform: translateX(20px);
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
        gap: 16px;
      }
      .card {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 18px;
        padding: 18px;
        backdrop-filter: blur(10px);
        box-shadow: 0 18px 50px var(--shadow-card);
        transition: border-color 0.2s ease, background 0.2s ease,
          box-shadow 0.2s ease;
      }
      .card h2 {
        margin: 0 0 10px;
        font-size: 18px;
      }
      a.btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        padding: 12px 16px;
        border-radius: 999px;
        text-decoration: none;
        font-weight: 700;
        border: 1px solid transparent;
        background: linear-gradient(135deg, var(--accent), var(--accent2));
        color: #fff;
      }
      a.btn:focus-visible {
        outline: 3px solid var(--btn-focus);
        outline-offset: 3px;
      }
      .small {
        margin-top: 14px;
        font-size: 12px;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <header class="page-head">
        <div class="head-text">
          <h1>Сайт-визитки</h1>
          <p>
            Две страницы проекта: базовая версия и версия с калькулятором
            стоимости.
          </p>
        </div>
        <button
          type="button"
          class="theme-toggle"
          id="themeToggle"
          aria-pressed="false"
          aria-label="Переключить на тёмную тему"
        >
          <span class="theme-toggle__track" aria-hidden="true">
            <span class="theme-toggle__thumb"></span>
          </span>
          <span id="themeLabel">Светлая</span>
        </button>
      </header>

      <section class="grid" aria-label="Ссылки на страницы проекта">
        <div class="card">
          <h2>Базовая визитка</h2>
          <a
            class="btn"
            href="Сайт-визитка%202.html"
            title="Открыть файл Сайт-визитка 2.html"
            >Открыть</a
          >
          <div class="small">Файл: `Сайт-визитка 2.html`</div>
        </div>

        <div class="card">
          <h2>Визитка + калькулятор</h2>
          <a
            class="btn"
            href="Сайт-визитка%202%20калькулятор%20исправленный.html"
            title="Открыть файл Сайт-визитка 2 калькулятор исправленный.html"
            >Открыть</a
          >
          <div class="small">Файл: `Сайт-визитка 2 калькулятор исправленный.html`</div>
        </div>
      </section>
    </main>
    <script>
      (function () {
        var KEY = "theme";
        var root = document.documentElement;
        var btn = document.getElementById("themeToggle");
        var label = document.getElementById("themeLabel");

        function current() {
          return root.getAttribute("data-theme") === "dark" ? "dark" : "light";
        }

        function syncUi() {
          var dark = current() === "dark";
          btn.setAttribute("aria-pressed", dark ? "true" : "false");
          btn.setAttribute(
            "aria-label",
            dark ? "Переключить на светлую тему" : "Переключить на тёмную тему"
          );
          if (label) label.textContent = dark ? "Тёмная" : "Светлая";
        }

        function setTheme(t) {
          root.setAttribute("data-theme", t);
          try {
            localStorage.setItem(KEY, t);
          } catch (e) {}
          syncUi();
        }

        btn.addEventListener("click", function () {
          setTheme(current() === "dark" ? "light" : "dark");
        });

        syncUi();
      })();
    </script>
  </body>
</html>
